name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpunit:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Нижняя и верхняя границы диапазона из composer.json ("php": "^8.2").
        php: ['8.2', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # Тесты гоняются на SQLite в памяти (см. phpunit.xml).
          extensions: mbstring, dom, fileinfo, xml, ctype, json, tokenizer, sqlite3, pdo_sqlite
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install PHP dependencies
        # Без --no-dev: PHPUnit и Collision лежат в require-dev.
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        # Обязательный шаг: layouts/app.blade.php использует @vite, и без
        # манифеста в public/build все тесты, рендерящие вьюхи, падают.
        run: npm run build

      - name: Run test suite
        run: php artisan test
